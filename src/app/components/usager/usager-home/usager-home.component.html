<div class="uh-wrap">

  <!-- ── Bienvenue ─────────────────────────────── -->
  <div class="uh-greeting">
    <div class="uh-greeting__icon">
      <i class="bi bi-grid-3x3-gap-fill"></i>
    </div>
    <div>
      <h2 class="uh-greeting__title">
        Bonjour<span *ngIf="prenomAdmin">, {{ prenomAdmin }}</span>
      </h2>
      <p class="uh-greeting__sub">
        Sélectionnez le formulaire correspondant à votre demande.
      </p>
    </div>
  </div>

  <!-- ── Grille des formulaires ─────────────────── -->
  <div class="uh-grid">
    <a *ngFor="let f of formulaires"
       [routerLink]="f.route"
       class="uh-card"
       [style.--c-accent]="f.accentColor"
       [style.--c-bg]="f.bgColor"
       [style.--c-text]="f.textColor">

      <!-- Bandeau coloré -->
      <div class="uh-card__band">
        <div class="uh-card__icon-wrap">
          <i class="bi {{ f.icon }}"></i>
        </div>
      </div>

      <!-- Corps texte -->
      <div class="uh-card__body">
        <h3 class="uh-card__title">{{ f.titre }}</h3>
        <p class="uh-card__desc">{{ f.description }}</p>
        <span class="uh-card__cta">
          Accéder au formulaire
          <i class="bi bi-arrow-right"></i>
        </span>
      </div>

    </a>
  </div>

  <!-- ── Note ──────────────────────────────────── -->
  <p class="uh-note">
    <i class="bi bi-info-circle"></i>
    Pour toute question, contactez votre bibliothécaire disciplinaire.
  </p>

</div>
