<!-- user-layout.component.html -->
<div class="container-scroller">
  <header class="ul-header">

    <!-- Logo -->
    <a routerLink="/usager" class="ul-logo">
      <img src="assets/images/logo-udem-white.svg" alt="Bibliothèques UdeM" style="height: 40px;">
      <span class="ul-logo__text">{{ 'user-layout.les-bibliotheques' | translate }}</span>
    </a>

    <!-- Droite -->
    <div class="ul-right">

      <!-- Menu utilisateur -->
      <div class="ul-user" [class.ul-user--open]="userOpen">
        <button class="ul-user__btn" (click)="toggleUser($event)">
          <span class="ul-user__avatar">{{ initiales }}</span>
          <span class="ul-user__name d-none d-sm-inline">{{ userName }}</span>
          <i class="bi bi-chevron-down ul-user__caret d-none d-sm-inline"></i>
        </button>

        <div class="ul-user__panel" *ngIf="userOpen" (click)="$event.stopPropagation()">
          <div class="ul-user__head">
            <span class="ul-user__avatar ul-user__avatar--lg">{{ initiales }}</span>
            <div>
              <div class="ul-user__fullname">{{ userName }}</div>
              <div class="ul-user__role">{{ 'user-layout.role' | translate }}</div>
            </div>
          </div>
          <div class="ul-user__body">
            <button class="ul-user__item" (click)="mesDemandes()">
              <i class="bi bi-clock-history ul-user__item-icon"></i>
              <span>Mes demandes</span>
              <i class="bi bi-chevron-right ul-user__item-arrow"></i>
            </button>
            <button class="ul-user__item" (click)="logout()">
              <i class="bi bi-box-arrow-right ul-user__item-icon"></i>
              <span>{{ 'user-layout.deconnexion' | translate }}</span>
              <i class="bi bi-chevron-right ul-user__item-arrow"></i>
            </button>
          </div>
        </div>
      </div>

    </div>
  </header>

  <main class="container mt-4">
    <router-outlet></router-outlet>
  </main>
</div>
