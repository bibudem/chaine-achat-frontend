<!-- user-layout.component.html -->
<div class="container-scroller">
  <header class="user-header d-flex justify-content-between align-items-center px-4 py-2 bg-dark text-white">
    <img src="assets/images/biblio-logo.png" alt="Logo UdeM" style="height: 40px;">
    <div>
      <i class="bi bi-person-circle me-2"></i>
      <span>{{ userName }}</span>
      <button class="btn btn-sm btn-outline-light ms-3" (click)="logout()">
        <i class="bi bi-box-arrow-right me-1"></i>Déconnexion
      </button>
    </div>
  </header>

  <main class="container mt-4">
    <router-outlet></router-outlet>
  </main>
</div>
