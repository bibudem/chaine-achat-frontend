<!-- dialog.component.html -->
<div *ngIf="isVisible" class="dlg-backdrop" (click)="onCancel()">
  <div class="dlg-modal" (click)="$event.stopPropagation()" role="dialog" aria-modal="true" [attr.aria-labelledby]="'dlg-title'">

    <!-- Barre colorée type -->
    <div class="dlg-bar" [ngClass]="{
      'dlg-bar--success': config?.type === 'success',
      'dlg-bar--error':   config?.type === 'error',
      'dlg-bar--warning': config?.type === 'warning',
      'dlg-bar--info':    config?.type === 'info',
      'dlg-bar--confirm': config?.type === 'confirm'
    }"></div>

    <!-- Header -->
    <div class="dlg-header">
      <div class="dlg-icon-wrap" [ngClass]="{
        'dlg-icon-wrap--success': config?.type === 'success',
        'dlg-icon-wrap--error':   config?.type === 'error',
        'dlg-icon-wrap--warning': config?.type === 'warning',
        'dlg-icon-wrap--info':    config?.type === 'info',
        'dlg-icon-wrap--confirm': config?.type === 'confirm'
      }">
        <i class="bi" [ngClass]="{
          'bi-check-lg':            config?.type === 'success',
          'bi-x-lg':                config?.type === 'error',
          'bi-exclamation-lg':      config?.type === 'warning',
          'bi-info-lg':             config?.type === 'info',
          'bi-question-lg':         config?.type === 'confirm'
        }"></i>
      </div>
      <h5 class="dlg-title" id="dlg-title">{{ config?.title }}</h5>
      <button class="dlg-close" (click)="onCancel()" aria-label="Fermer">
        <i class="bi bi-x"></i>
      </button>
    </div>

    <!-- Corps -->
    <div class="dlg-body">
      <p class="dlg-message">{{ config?.message }}</p>
    </div>

    <!-- Pied -->
    <div class="dlg-footer">
      <button *ngIf="config?.type === 'confirm'"
              class="btn btn-outline-secondary"
              (click)="onCancel()">
        {{ config?.cancelText || 'Annuler' }}
      </button>
      <button class="btn" (click)="onConfirm()" [ngClass]="{
        'btn-success':         config?.type === 'success',
        'btn-danger':          config?.type === 'error',
        'btn-warning':         config?.type === 'warning',
        'btn-info':            config?.type === 'info',
        'btn-primary':         config?.type === 'confirm'
      }">
        {{ config?.confirmText || 'OK' }}
      </button>
    </div>

  </div>
</div>
