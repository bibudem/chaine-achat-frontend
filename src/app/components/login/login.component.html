<div class="login-page">
  <div class="login-box">

    <div class="login-strip"></div>

    <div class="login-content">
      <div class="login-avatar">
        <img src="assets/images/logo-circle-Biblio.png" alt="Bibliothèques UdeM" class="login-avatar__img">
      </div>

      <div class="login-title">{{ 'login-page.app-name' | translate }}</div>
      <div class="login-subtitle">{{ 'login-page.org-name' | translate }}</div>

      <div class="login-badge" [class.login-badge--dev]="!isProduction">
        <i class="bi me-1" [class.bi-building]="isProduction" [class.bi-laptop]="!isProduction"></i>
        {{ (isProduction ? 'login-page.badge-prod' : 'login-page.badge-local') | translate }}
      </div>

      <div class="login-alert" *ngIf="accessDenied">
        <i class="bi bi-shield-exclamation me-2"></i>
        {{ 'login-page.acces-refuse' | translate }}
      </div>

      <p class="login-hint">{{ 'login-page.hint' | translate }}</p>

      <div class="login-cards">
        <button *ngFor="let p of profiles" class="login-card" (click)="select(p)">
          <div class="login-card__icon-wrap">
            <i class="bi {{ p.icon }}"></i>
          </div>
          <div class="login-card__text">
            <div class="login-card__label">{{ p.label }}</div>
            <div class="login-card__desc">{{ p.description }}</div>
          </div>
          <i class="bi bi-chevron-right login-card__arrow"></i>
        </button>
      </div>
    </div>

  </div>
</div>
